;----------------------------------------------------------------------------------------------
; CONFIGURACOES DOS CONTENTS
;----------------------------------------------------------------------------------------------
;
; mount:    Chave escrita no mount.cfg do Garry's Mod. Use nomes como cstrike, tf, dod.
; steam:    Caminho a partir da pasta do Steam ate a pasta base do jogo.
; subpasta: Pasta dentro do jogo que contem gameinfo.txt. Em branco = a propria pasta base.
; login:    Disponibilidade do content para download via SteamCMD:
;               Anonimo        - Pode ser baixado sem login.
;               Usuario        - Requer login_steam no cfg.ini.
;               Indisponivel   - Use apenas instalacao local do Steam, opcao 2.
; id:       App ID usado pelo SteamCMD quando opcao = 1.
; opcao:    1 - Instalar/atualizar via SteamCMD.
;           2 - Usar instalacao presente no Steam.
;           3 - Ignorar.
;
; A lista e um ponto de partida. Para um jogo/mod novo, copie uma secao, ajuste mount, steam,
; subpasta e id, e deixe opcao = 1 ou 2.
;----------------------------------------------------------------------------------------------

[Counter-Strike: Source]
mount = cstrike
steam = steamapps\common\Counter-Strike Source
subpasta = cstrike
login = Anonimo
id = 232330
opcao = 3

